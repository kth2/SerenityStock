# Daily data pipeline: scrape @aleabitoreddit → process mentions → (optionally)
# run Claude-API deep analysis → commit updated JSON. The commit to the default
# branch triggers the deploy workflow, which rebuilds GitHub Pages.
name: Update data

on:
  schedule:
    - cron: "30 6 * * *" # daily 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write # to dispatch the Pages deploy after a data commit

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape tweets
        run: npm run scrape

      - name: Process mentions
        run: npm run process

      - name: Deep analysis (Claude API, optional)
        # Runs only if the ANTHROPIC_API_KEY secret is configured; otherwise
        # the script exits cleanly and the app uses its built-in engine.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run analyze

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): daily scrape $(date -u +%F)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        # Pushes made with GITHUB_TOKEN never fire push-triggered workflows
        # (GitHub recursion guard), so dispatch the deploy explicitly.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
